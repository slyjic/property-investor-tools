name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format, test, bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify quality gate
        run: npm run verify

      - name: Ensure app.bundle.js is committed
        run: |
          if ! git diff --quiet -- app.bundle.js; then
            echo "app.bundle.js is out of date. Run npm run build:bundle and commit the result."
            git --no-pager diff -- app.bundle.js
            exit 1
          fi

  browser-checks:
    name: Accessibility and browser smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Accessibility audit
        run: npm run audit:a11y

      - name: Local browser smoke test
        run: |
          python3 -m http.server 4173 >/tmp/property-tools-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          node scripts/live-smoke.mjs http://127.0.0.1:4173

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports
          path: reports/
          if-no-files-found: ignore
